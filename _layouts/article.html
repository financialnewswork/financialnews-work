---
layout: default
---
<article class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="mb-4">
        <span class="badge bg-gold text-dark me-2">{{ page.company }}</span>
        <time class="text-muted" datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %d, %Y" }}</time>
      </div>
      <h1 class="article-title mb-4">{{ page.title }}</h1>
      {% if page.tags %}
      <div class="mb-4">
        {% for tag in page.tags limit:5 %}
        <span class="badge bg-light text-navy me-1">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
      <div class="article-body">
        {{ content }}
      </div>
      {% if page.source_url %}
      <div class="mt-5 pt-4 border-top">
        <p class="text-muted small">Source: <a href="{{ page.source_url }}" target="_blank" rel="noopener">Original Press Release</a></p>
      </div>
      {% endif %}
      <div class="mt-4">
        <a href="{{ '/news/' | relative_url }}" class="btn btn-outline-navy">&larr; Back to News</a>
      </div>
    </div>
  </div>
</article>
