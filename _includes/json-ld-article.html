<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Organization",
    "name": "Financial News Wire",
    "url": "{{ site.url }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Financial News Wire",
    "url": "{{ site.url }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}/assets/images/logo.png"
    }
  },
  "description": {{ page.content | strip_html | truncatewords: 50 | jsonify }},
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "url": "{{ page.url | absolute_url }}",
  "articleSection": "Financial News",
  "keywords": {{ page.tags | jsonify }},
  "about": {
    "@type": "Organization",
    "name": {{ page.company | jsonify }}
  }{% if page.source_url %},
  "isBasedOn": {{ page.source_url | jsonify }}{% endif %}
}
</script>
